<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | 호호모빌리티</title>
    <script type="text/javascript">
        async function tryRedirect() {
            let path = window.location.pathname;
            
            // 끝에 슬래시가 있다면 제거 (예: //service/ -> //service)
            if (path.endsWith('/')) path = path.slice(0, -1);
            
            let segments = path.split('/');
            
            // 경로 조각을 뒤에서부터 하나씩 제거하며 확인
            while (segments.length > 1) {
                segments.pop(); // 마지막 세그먼트 제거
                let parentPath = segments.join('/') || '/';
                
                try {
                    // 해당 부모 경로가 존재하는지 살짝 확인 (HEAD 요청으로 데이터 절약)
                    let response = await fetch(parentPath, { method: 'HEAD' });
                    
                    if (response.ok) {
                        // 유효한 페이지를 찾으면 즉시 이동
                        window.location.href = parentPath;
                        return;
                    }
                } catch (e) {
                    // 에러 발생 시 무시하고 다음 상위 경로 시도
                }
            }
            
            // 최후의 수단으로 메인 페이지로 이동
            window.location.href = '/';
        }

        tryRedirect();
    </script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #64748b; text-align: center; }
        
        /* 자동차 이모지 스타일 및 애니메이션 */
        .car-emoji { font-size: 4rem; animation: moveCar 2s infinite linear; display: inline-block; }
        @keyframes moveCar { 0% { transform: translateX(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(100vw); opacity: 0; } }
        
        /* 멘트 스타일 */
        p { margin: 10px 0; }
    </style>
</head>
<body>
    <span class="car-emoji">🚗</span><br>
    <p>Connecting you to the best page. Please wait a moment.</p>
    <p>가장 적절한 페이지로 연결 중입니다. 잠시만 기다려 주세요.</p>
</body>
</html>
