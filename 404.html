<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>페이지를 찾을 수 없습니다 | 호호모빌리티</title>
    <script type="text/javascript">
        async function tryRedirect() {
            let path = window.location.pathname;
            
            // 끝에 슬래시가 있다면 제거 (예: /en/service/ -> /en/service)
            if (path.endsWith('/')) path = path.slice(0, -1);
            
            let segments = path.split('/');
            
            // 경로 조각을 뒤에서부터 하나씩 제거하며 확인
            while (segments.length > 1) {
                segments.pop(); // 마지막 세그먼트 제거
                let parentPath = segments.join('/') || '/';
                
                try {
                    // 해당 부모 경로가 존재하는지 살짝 확인 (HEAD 요청으로 데이터 절약)
                    let response = await fetch(parentPath, { method: 'HEAD' });
                    
                    if (response.ok) {
                        // 유효한 페이지를 찾으면 즉시 이동
                        window.location.href = parentPath;
                        return;
                    }
                } catch (e) {
                    // 에러 발생 시 무시하고 다음 상위 경로 시도
                }
            }
            
            // 최후의 수단으로 메인 페이지로 이동
            window.location.href = '/';
        }

        tryRedirect();
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #64748b; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2E5C9E; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-right: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>가장 가까운 페이지로 이동 중입니다...</p>
</body>
</html>
